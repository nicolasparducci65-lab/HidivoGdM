<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HiDiVo GdM - Gestion de Mantenimiento</title>
<meta name="theme-color" content="#10101C">
<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root{
    --azul:#0073EA;
    --azul-dark:#005bb8;
    --ambar:#FAC775;
    --ambar-dark:#854F0B;
    --ambar-darker:#412402;
    --sidebar-bg:#10101C;
    --sidebar-text:#B4B2A9;
    --sidebar-text-dim:#5F5E5A;
    --bg-main:#F5F6F8;
    --bg-card:#FFFFFF;
    --border:#E4E6EA;
    --texto:#1A1A1A;
    --texto-sec:#5F5E5A;
    --verde:#00C875;
    --verde-bg:#EAF3DE;
    --verde-text:#173404;
    --amarillo:#EF9F27;
    --amarillo-bg:#FAEEDA;
    --amarillo-text:#412402;
    --rojo:#E2445C;
    --rojo-bg:#FCEBEB;
    --rojo-text:#501313;
    --radius-sm:6px;
    --radius-md:8px;
    --radius-lg:12px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg-main);
    color:var(--texto);
    -webkit-font-smoothing:antialiased;
  }
  #app{display:none;}
  button{font-family:inherit; cursor:pointer;}
  input, select, textarea{font-family:inherit; font-size:14px;}
  a{color:var(--azul); text-decoration:none;}

  /* ===== LOGIN ===== */
  #login-screen{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--sidebar-bg);
    padding:20px;
  }
  .login-box{
    background:#fff;
    border-radius:var(--radius-lg);
    padding:36px 32px;
    width:100%;
    max-width:380px;
    box-shadow:0 8px 30px rgba(0,0,0,0.25);
  }
  .login-logo{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:6px;
  }
  .login-logo-icon{
    width:36px; height:36px;
    border-radius:8px;
    background:var(--ambar);
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:18px; color:var(--ambar-darker);
    flex-shrink:0;
  }
  .login-logo-text h1{font-size:18px; font-weight:600; color:var(--texto);}
  .login-logo-text p{font-size:11px; letter-spacing:0.5px; color:var(--texto-sec); text-transform:uppercase;}
  .login-box form{margin-top:24px; display:flex; flex-direction:column; gap:14px;}
  .login-box label{font-size:13px; font-weight:500; color:var(--texto-sec); margin-bottom:4px; display:block;}
  .login-box input{
    width:100%; padding:10px 12px;
    border:1px solid var(--border); border-radius:var(--radius-sm);
    font-size:14px;
  }
  .login-box input:focus{outline:none; border-color:var(--azul); box-shadow:0 0 0 3px rgba(0,115,234,0.12);}
  .btn-login{
    background:var(--azul); color:#fff; border:none;
    padding:11px; border-radius:var(--radius-sm); font-size:14px; font-weight:600;
    margin-top:6px;
  }
  .btn-login:hover{background:var(--azul-dark);}
  .btn-login:disabled{opacity:0.6; cursor:default;}
  .login-error{
    background:var(--rojo-bg); color:var(--rojo-text);
    font-size:13px; padding:10px 12px; border-radius:var(--radius-sm);
    display:none;
  }

  /* ===== LAYOUT ===== */
  .layout{display:flex; min-height:100vh;}
  .sidebar{
    width:230px; flex-shrink:0;
    background:var(--sidebar-bg);
    display:flex; flex-direction:column;
    position:fixed; top:0; left:0; height:100vh; overflow-y:auto;
    z-index:50;
    transition:transform 0.2s ease;
  }
  .sidebar-header{
    display:flex; align-items:center; gap:10px;
    padding:18px 18px 16px;
    border-bottom:1px solid rgba(255,255,255,0.08);
  }
  .sidebar-logo{
    width:30px; height:30px; border-radius:7px;
    background:var(--ambar); color:var(--ambar-darker);
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:15px; flex-shrink:0;
  }
  .sidebar-header-text p:first-child{color:#fff; font-weight:600; font-size:14px;}
  .sidebar-header-text p:last-child{color:var(--sidebar-text-dim); font-size:9.5px; letter-spacing:0.6px;}
  .sidebar-nav{padding:14px 10px; flex:1;}
  .nav-group-label{
    color:var(--sidebar-text-dim); font-size:11px; letter-spacing:0.5px;
    padding:14px 10px 6px; text-transform:uppercase;
  }
  .nav-group-label:first-child{padding-top:0;}
  .nav-item{
    display:flex; align-items:center; gap:10px;
    padding:9px 10px; border-radius:var(--radius-sm);
    color:var(--sidebar-text); font-size:13.5px; font-weight:500;
    cursor:pointer; margin-bottom:2px; position:relative;
    border:none; background:none; width:100%; text-align:left;
  }
  .nav-item:hover{background:rgba(255,255,255,0.06); color:#fff;}
  .nav-item.active{background:var(--ambar); color:var(--ambar-darker);}
  .nav-item .icon{width:16px; height:16px; flex-shrink:0; display:flex; align-items:center; justify-content:center;}
  .nav-badge{
    margin-left:auto; background:var(--rojo); color:#fff;
    font-size:11px; font-weight:700; border-radius:10px;
    min-width:18px; height:18px; display:flex; align-items:center; justify-content:center;
    padding:0 5px;
  }
  .sidebar-footer{
    padding:14px 16px; border-top:1px solid rgba(255,255,255,0.08);
    display:flex; align-items:center; gap:10px;
  }
  .avatar-circle{
    width:30px; height:30px; border-radius:50%;
    background:var(--sidebar-text-dim); color:#fff;
    display:flex; align-items:center; justify-content:center;
    font-size:12px; font-weight:600; flex-shrink:0;
  }
  .sidebar-footer-text p:first-child{color:#fff; font-size:13px;}
  .sidebar-footer-text p:last-child{color:var(--sidebar-text-dim); font-size:11px;}
  .btn-logout{
    margin-left:auto; background:none; border:none; color:var(--sidebar-text-dim);
    font-size:16px; padding:4px;
  }
  .btn-logout:hover{color:#fff;}

  .main-content{
    flex:1; margin-left:230px;
    padding:24px 28px;
    min-width:0;
  }
  .topbar-mobile{
    display:none;
    align-items:center; justify-content:space-between;
    background:var(--sidebar-bg); padding:14px 16px;
    position:sticky; top:0; z-index:40;
  }
  .topbar-mobile button{background:none; border:none; color:#fff; font-size:22px;}

  .page-header{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:20px; flex-wrap:wrap; gap:10px;
  }
  .page-header h2{font-size:19px; font-weight:600;}
  .page-header-actions{display:flex; gap:8px; align-items:center;}

  .btn{
    border:1px solid var(--border); background:#fff; color:var(--texto);
    padding:8px 14px; border-radius:var(--radius-sm); font-size:13px; font-weight:500;
    display:inline-flex; align-items:center; gap:6px;
  }
  .btn:hover{background:#f5f5f5;}
  .btn-primary{background:var(--azul); border-color:var(--azul); color:#fff;}
  .btn-primary:hover{background:var(--azul-dark);}
  .btn-success{background:var(--verde); border-color:var(--verde); color:#fff;}
  .btn-danger{background:var(--rojo); border-color:var(--rojo); color:#fff;}
  .btn-sm{padding:5px 10px; font-size:12.5px;}
  .btn:disabled{opacity:0.55; cursor:default;}

  .card{
    background:var(--bg-card); border:1px solid var(--border);
    border-radius:var(--radius-md); padding:16px 18px;
  }
  .loading-state, .empty-state{
    text-align:center; padding:40px 20px; color:var(--texto-sec); font-size:13.5px;
  }
  .toast-container{
    position:fixed; top:18px; right:18px; z-index:200;
    display:flex; flex-direction:column; gap:8px;
  }
  .toast{
    background:#1A1A1A; color:#fff; padding:11px 16px; border-radius:var(--radius-sm);
    font-size:13.5px; box-shadow:0 4px 16px rgba(0,0,0,0.25);
    animation:toast-in 0.18s ease;
    max-width:320px;
  }
  .toast.success{background:var(--verde);}
  .toast.error{background:var(--rojo);}
  @keyframes toast-in{from{opacity:0; transform:translateY(-8px);} to{opacity:1; transform:translateY(0);}}

  .modal-overlay{
    position:fixed; inset:0; background:rgba(0,0,0,0.45);
    display:none; align-items:center; justify-content:center; z-index:100;
    padding:20px; overflow-y:auto;
  }
  .modal-overlay.open{display:flex;}
  .modal-box{
    background:#fff; border-radius:var(--radius-lg); width:100%; max-width:520px;
    max-height:90vh; overflow-y:auto;
  }
  .modal-header{
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 20px; border-bottom:1px solid var(--border);
  }
  .modal-header h3{font-size:16px; font-weight:600;}
  .modal-close{background:none; border:none; font-size:20px; color:var(--texto-sec); line-height:1;}
  .modal-body{padding:20px;}
  .modal-footer{
    padding:14px 20px; border-top:1px solid var(--border);
    display:flex; justify-content:flex-end; gap:8px;
  }
  .form-group{margin-bottom:14px;}
  .form-group label{display:block; font-size:12.5px; font-weight:500; color:var(--texto-sec); margin-bottom:5px;}
  .form-group input, .form-group select, .form-group textarea{
    width:100%; padding:9px 11px; border:1px solid var(--border); border-radius:var(--radius-sm);
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus{
    outline:none; border-color:var(--azul);
  }
  .form-row{display:grid; grid-template-columns:1fr 1fr; gap:12px;}

  .badge{
    display:inline-flex; align-items:center; font-size:11.5px; font-weight:600;
    padding:3px 9px; border-radius:var(--radius-sm);
  }
  .badge-verde{background:var(--verde-bg); color:var(--verde-text);}
  .badge-amarillo{background:var(--amarillo-bg); color:var(--amarillo-text);}
  .badge-rojo{background:var(--rojo-bg); color:var(--rojo-text);}
  .badge-gris{background:#F1EFE8; color:#444441;}

  @media (max-width:860px){
    .sidebar{transform:translateX(-100%);}
    .sidebar.open{transform:translateX(0);}
    .main-content{margin-left:0; padding:18px 16px;}
    .topbar-mobile{display:flex;}
    .form-row{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-icon">H</div>
      <div class="login-logo-text">
        <h1>HiDiVo GdM</h1>
        <p>Gestion de Mantenimiento</p>
      </div>
    </div>
    <form id="login-form">
      <div class="login-error" id="login-error"></div>
      <div>
        <label for="login-email">Correo</label>
        <input type="email" id="login-email" required autocomplete="username">
      </div>
      <div>
        <label for="login-password">Contrasena</label>
        <input type="password" id="login-password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login" id="login-btn">Ingresar</button>
    </form>
  </div>
</div>

<div id="app">
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">H</div>
        <div class="sidebar-header-text">
          <p>HiDiVo</p>
          <p>GESTION DE MANTENIMIENTO</p>
        </div>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
      <div class="sidebar-footer">
        <div class="avatar-circle" id="user-avatar">-</div>
        <div class="sidebar-footer-text">
          <p id="user-name">-</p>
          <p id="user-role">-</p>
        </div>
        <button class="btn-logout" id="btn-logout" title="Cerrar sesion">&#10162;</button>
      </div>
    </aside>

    <main class="main-content">
      <div class="topbar-mobile">
        <button id="btn-menu">&#9776;</button>
        <strong style="color:#fff; font-size:14px;">HiDiVo GdM</strong>
        <span style="width:22px;"></span>
      </div>
      <div id="view-container"></div>
    </main>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box" id="modal-box"></div>
</div>

<script>
const SUPABASE_URL = "https://kpswaoqxaxvhrgxntkcq.supabase.co";
const SUPABASE_KEY = "sb_publishable_KofUOOKhYd2a6g6O1_4g0w_LYAgjebm";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let currentRole = null;
let currentView = "dashboard";

function showToast(msg, type){
  const c = document.getElementById("toast-container");
  const t = document.createElement("div");
  t.className = "toast" + (type ? " " + type : "");
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(()=>t.remove(), 4000);
}

function openModal(html){
  document.getElementById("modal-box").innerHTML = html;
  document.getElementById("modal-overlay").classList.add("open");
}
function closeModal(){
  document.getElementById("modal-overlay").classList.remove("open");
  document.getElementById("modal-box").innerHTML = "";
}
document.getElementById("modal-overlay").addEventListener("click", (e)=>{
  if(e.target.id === "modal-overlay") closeModal();
});

const NAV_ITEMS = [
  {group:"Principal", items:[
    {id:"dashboard", label:"Dashboard", icon:"&#9632;"},
  ]},
  {group:"Flota", items:[
    {id:"equipos", label:"Equipos", icon:"&#9881;"},
    {id:"planes", label:"Planes de mantenimiento", icon:"&#128203;"},
    {id:"programados", label:"Programados", icon:"&#128197;"},
    {id:"horometro", label:"Horometro", icon:"&#9201;"},
    {id:"historial", label:"Historial", icon:"&#128196;"},
  ]},
  {group:"Sistema", items:[
    {id:"notificaciones", label:"Notificaciones", icon:"&#128276;", badgeId:"nav-badge-notif"},
    {id:"usuarios", label:"Usuarios", icon:"&#128100;", soloAdmin:true},
  ]},
];

function renderSidebar(){
  const nav = document.getElementById("sidebar-nav");
  let html = "";
  NAV_ITEMS.forEach(group=>{
    const itemsVisibles = group.items.filter(item => !item.soloAdmin || esAdmin());
    if(!itemsVisibles.length) return;
    html += `<div class="nav-group-label">${group.group}</div>`;
    itemsVisibles.forEach(item=>{
      html += `<button class="nav-item" data-view="${item.id}">
        <span class="icon">${item.icon}</span>
        <span>${item.label}</span>
        ${item.badgeId ? `<span class="nav-badge" id="${item.badgeId}" style="display:none;">0</span>` : ""}
      </button>`;
    });
  });
  nav.innerHTML = html;
  nav.querySelectorAll(".nav-item").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      navigateTo(btn.dataset.view);
      document.getElementById("sidebar").classList.remove("open");
    });
  });
}

function setActiveNav(viewId){
  document.querySelectorAll(".nav-item").forEach(btn=>{
    btn.classList.toggle("active", btn.dataset.view === viewId);
  });
}

document.getElementById("btn-menu").addEventListener("click", ()=>{
  document.getElementById("sidebar").classList.toggle("open");
});

document.getElementById("login-form").addEventListener("submit", async (e)=>{
  e.preventDefault();
  const email = document.getElementById("login-email").value.trim();
  const password = document.getElementById("login-password").value;
  const btn = document.getElementById("login-btn");
  const errBox = document.getElementById("login-error");
  errBox.style.display = "none";
  btn.disabled = true;
  btn.textContent = "Ingresando...";

  const { data, error } = await sb.auth.signInWithPassword({ email, password });

  if(error){
    errBox.textContent = "Credenciales invalidas o sin acceso. Verifica tu correo y contrasena.";
    errBox.style.display = "block";
    btn.disabled = false;
    btn.textContent = "Ingresar";
    return;
  }
  await initSession(data.user);
});

document.getElementById("btn-logout").addEventListener("click", async ()=>{
  await sb.auth.signOut();
  currentUser = null;
  currentRole = null;
  document.getElementById("app").style.display = "none";
  document.getElementById("login-screen").style.display = "flex";
});

async function initSession(user){
  currentUser = user;

  const { data: roleData, error: roleError } = await sb
    .from("gdm_usuarios_roles")
    .select("rol, activo")
    .eq("user_id", user.id)
    .maybeSingle();

  if(roleError || !roleData || !roleData.activo){
    document.getElementById("login-error").textContent = "Tu cuenta no tiene acceso a HiDiVo GdM. Contacta al administrador.";
    document.getElementById("login-error").style.display = "block";
    await sb.auth.signOut();
    return;
  }

  currentRole = roleData.rol;
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("app").style.display = "block";

  const initials = (user.email || "?").slice(0,2).toUpperCase();
  document.getElementById("user-avatar").textContent = initials;
  document.getElementById("user-name").textContent = user.email;
  document.getElementById("user-role").textContent =
    currentRole === "admin" ? "Administrador" :
    currentRole === "supervisor" ? "Supervisor" : "Tecnico";

  renderSidebar();
  navigateTo("dashboard");
  refreshNotifBadge();
}

async function checkExistingSession(){
  const { data } = await sb.auth.getSession();
  if(data.session && data.session.user){
    await initSession(data.session.user);
  }
}
checkExistingSession();

if("serviceWorker" in navigator){
  window.addEventListener("load", ()=>{
    navigator.serviceWorker.register("./sw.js").catch(()=>{});
  });
}

function navigateTo(viewId){
  currentView = viewId;
  setActiveNav(viewId);
  const renderers = {
    dashboard: renderDashboard,
    equipos: renderEquipos,
    planes: renderPlanes,
    programados: renderProgramados,
    horometro: renderHorometro,
    historial: renderHistorial,
    notificaciones: renderNotificaciones,
    usuarios: renderUsuarios,
  };
  const fn = renderers[viewId];
  if(fn) fn();
}

async function refreshNotifBadge(){
  const { count } = await sb
    .from("gdm_notificaciones")
    .select("*", { count: "exact", head: true })
    .eq("leida", false);
  const badge = document.getElementById("nav-badge-notif");
  if(badge){
    if(count && count > 0){
      badge.textContent = count;
      badge.style.display = "flex";
    } else {
      badge.style.display = "none";
    }
  }
}

function puedeEscribir(){
  return currentRole === "admin" || currentRole === "supervisor";
}
function esAdmin(){
  return currentRole === "admin";
}

/* ============================================================
   DASHBOARD
   ============================================================ */
async function renderDashboard(){
  const view = document.getElementById("view-container");
  view.innerHTML = `
    <div class="page-header"><h2>Dashboard de mantenimiento</h2></div>
    <div class="loading-state">Cargando estado de la flota...</div>
  `;

  const [{ data: equipos }, { data: semaforo }] = await Promise.all([
    sb.from("gdm_equipos").select("id, estado"),
    sb.from("gdm_mantenimientos_semaforo").select("*"),
  ]);

  const totalEquipos = equipos ? equipos.length : 0;
  const sem = semaforo || [];
  const rojos = sem.filter(s => s.color_semaforo === "rojo");
  const amarillos = sem.filter(s => s.color_semaforo === "amarillo");
  const verdes = sem.filter(s => s.color_semaforo === "verde");

  const { data: asignaciones } = await sb
    .from("gdm_asignacion_equipos")
    .select("equipo_id, proyecto_id, proyectos(nombre)")
    .is("fecha_fin", null);

  const proyectoPorEquipo = {};
  (asignaciones || []).forEach(a=>{
    proyectoPorEquipo[a.equipo_id] = a.proyectos ? a.proyectos.nombre : null;
  });

  function filaSemaforo(s){
    const color = s.color_semaforo;
    const proyecto = proyectoPorEquipo[s.equipo_id];
    let detalle = "";
    if(s.fecha_objetivo){
      const dias = s.dias_restantes;
      detalle = dias < 0 ? `Vencido hace ${Math.abs(dias)} dia(s)` :
                dias === 0 ? "Vence hoy" : `Vence en ${dias} dia(s)`;
    } else if(s.frecuencia_horometro){
      const pct = s.pct_vida_util_restante;
      detalle = pct <= 0 ? "Vencido por horometro" : `${pct}% de vida util restante`;
    }
    return `
      <div class="card" style="border-left:4px solid var(--${color}); border-radius:0 var(--radius-md) var(--radius-md) 0; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:8px;">
        <div>
          <div style="font-weight:600; font-size:13.5px;">${s.codigo_interno} - ${escapeHtml(s.equipo_nombre)}</div>
          <div style="font-size:12px; color:var(--texto-sec); margin-top:2px;">${escapeHtml(s.nombre_tarea)} &middot; ${detalle}</div>
        </div>
        ${proyecto ? `<span class="badge badge-gris">${escapeHtml(proyecto)}</span>` : `<span class="badge badge-gris">Sin proyecto</span>`}
      </div>
    `;
  }

  const ordenados = [...rojos, ...amarillos, ...verdes];

  view.innerHTML = `
    <div class="page-header"><h2>Dashboard de mantenimiento</h2></div>
    <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(150px,1fr)); gap:12px; margin-bottom:24px;">
      <div class="card"><div style="font-size:12px; color:var(--texto-sec); margin-bottom:4px;">Equipos totales</div><div style="font-size:22px; font-weight:700;">${totalEquipos}</div></div>

      <div class="card" style="background:var(--rojo-bg); border:none;"><div style="font-size:12px; color:var(--rojo-text); margin-bottom:4px;">Vencidos</div><div style="font-size:22px; font-weight:700; color:var(--rojo-text);">${rojos.length}</div></div>

      ${ordenados.length ? ordenados.map(filaSemaforo).join("") : `<div class="empty-state">No hay mantenimientos programados activos. Crea uno desde la seccion Programados.</div>`}
    </div>
  `;
}

function escapeHtml(str){
  if(str === null || str === undefined) return "";
  return String(str).replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
}

async function openEquipoDetalle(equipoId){
  const equipo = _equiposCache.find(e => e.id === equipoId);

  const { data: historial } = await sb
    .from("gdm_mantenimientos_historial")
    .select("*")
    .eq("equipo_id", equipoId)
    .order("fecha_real", { ascending: false })
    .limit(5);

  const { data: ultimaLectura } = await sb
    .from("gdm_lecturas_horometro")
    .select("*")
    .eq("equipo_id", equipoId)
    .order("fecha", { ascending: false })
    .limit(1)
    .maybeSingle();

  openModal(`
    <div class="modal-header">
      <h3>${escapeHtml(equipo.codigo_interno)} - ${escapeHtml(equipo.nombre)}</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>

        <div><strong>Tipo:</strong> ${escapeHtml(equipo.tipo)}</div>
        ${equipo.marca ? `<div><strong>Marca/Modelo:</strong> ${escapeHtml(equipo.marca)} ${escapeHtml(equipo.modelo||"")}</div>` : ""}
        ${equipo.serie ? `<div><strong>Serie:</strong> ${escapeHtml(equipo.serie)}</div>` : ""}
        <div><strong>Proyecto actual:</strong> ${equipo.proyecto_actual_nombre ? escapeHtml(equipo.proyecto_actual_nombre) : "Sin asignar"}</div>
        <div><strong>Ultimo horometro registrado:</strong> ${ultimaLectura ? ultimaLectura.horas_acumuladas + " hrs (" + ultimaLectura.fecha + ")" : "Sin lecturas"}</div>
      </div>
      <div style="font-size:12.5px; font-weight:600; color:var(--texto-sec); margin-bottom:8px; text-transform:uppercase;">Ultimos mantenimientos</div>
      ${(historial && historial.length) ? historial.map(h => `
        <div style="font-size:13px; padding:7px 0; border-bottom:1px solid var(--border);">
          <strong>${h.tipo_mantenimiento === "preventivo" ? "Preventivo" : "Correctivo"}</strong> &middot; ${h.fecha_real}
          ${h.costo ? ` &middot; $${h.costo}` : ""}
        </div>
      `).join("") : `<div style="font-size:13px; color:var(--texto-sec);">Sin historial registrado.</div>`}
    </div>
    <div class="modal-footer">
      ${puedeEscribir() ? `<button class="btn" id="btn-asignar-proyecto">Asignar a proyecto</button>` : ""}
      ${puedeEscribir() ? `<button class="btn" id="btn-editar-equipo">Editar</button>` : ""}
      ${esAdmin() ? `<button class="btn btn-danger" id="btn-eliminar-equipo">Eliminar</button>` : ""}
    </div>
  `);

  if(puedeEscribir()){
    document.getElementById("btn-editar-equipo").addEventListener("click", ()=>{
      closeModal();
      openEquipoModal(equipo);
    });
    document.getElementById("btn-asignar-proyecto").addEventListener("click", ()=>{
      openAsignarProyectoModal(equipo);
    });
  }
  if(esAdmin()){
    document.getElementById("btn-eliminar-equipo").addEventListener("click", async ()=>{
      if(!confirm("Eliminar este equipo? Esta accion no se puede deshacer.")) return;
      const { error } = await sb.from("gdm_equipos").delete().eq("id", equipo.id);
      if(error){ showToast("Error: " + error.message, "error"); return; }
      showToast("Equipo eliminado", "success");
      closeModal();
      renderEquipos();
    });
  }
}

async function openAsignarProyectoModal(equipo){
  const { data: proyectos } = await sb.from("proyectos").select("id, nombre").order("nombre");

  openModal(`
    <div class="modal-header">
      <h3>Asignar a proyecto</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Proyecto</label>
        <select id="f-proyecto">
          <option value="">-- Sin asignar (liberar equipo) --</option>
          ${(proyectos||[]).map(p => `<option value="${p.id}">${escapeHtml(p.nombre)}</option>`).join("")}
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="btn-confirmar-asignacion">Confirmar</button>
    </div>
  `);

  document.getElementById("btn-confirmar-asignacion").addEventListener("click", async ()=>{
    const nuevoProyectoId = document.getElementById("f-proyecto").value;

    const { error: errCierre } = await sb
      .from("gdm_asignacion_equipos")
      .update({ fecha_fin: new Date().toISOString().slice(0,10) })
      .eq("equipo_id", equipo.id)
      .is("fecha_fin", null);

    if(errCierre){
      showToast("Error al liberar asignacion previa: " + errCierre.message, "error");
      return;
    }

    if(nuevoProyectoId){
      const { error: errInsert } = await sb.from("gdm_asignacion_equipos").insert({
        equipo_id: equipo.id,
        proyecto_id: nuevoProyectoId,
        fecha_inicio: new Date().toISOString().slice(0,10),
      });
      if(errInsert){
        showToast("Error al asignar: " + errInsert.message, "error");
        return;
      }
    }

    showToast("Asignacion actualizada", "success");
    closeModal();
    renderEquipos();
  });
}

      const prog = programados.find(p => p.id === btn.dataset.completar);
      openCompletarMantenimientoModal(prog);
    });
  });
}

async function openNuevoProgramadoModal(){
  const [{ data: equipos }, { data: planes }] = await Promise.all([
    sb.from("gdm_equipos").select("id, codigo_interno, nombre, tipo").eq("estado", "operativo").order("codigo_interno"),
    sb.from("gdm_planes_mantenimiento").select("*").eq("activo", true).order("equipo_tipo"),
  ]);

  openModal(`
    <div class="modal-header">
      <h3>Programar mantenimiento</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Equipo *</label>
        <select id="f-equipo">
          <option value="">-- Selecciona un equipo --</option>
          ${(equipos||[]).map(e => `<option value="${e.id}" data-tipo="${escapeHtml(e.tipo)}">${escapeHtml(e.codigo_interno)} - ${escapeHtml(e.nombre)}</option>`).join("")}
        </select>
      </div>
      <div class="form-group">
        <label>Plan de mantenimiento *</label>
        <select id="f-plan">
          <option value="">-- Selecciona un equipo primero --</option>
        </select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Horometro objetivo</label>
          <input type="number" id="f-horometro-obj" placeholder="Ej: 1250">
        </div>
        <div class="form-group">
          <label>Fecha objetivo</label>
          <input type="date" id="f-fecha-obj">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="btn-save-programado">Programar</button>
    </div>
  `);

  const selectEquipo = document.getElementById("f-equipo");
  const selectPlan = document.getElementById("f-plan");

  selectEquipo.addEventListener("change", ()=>{
    const tipoSeleccionado = selectEquipo.selectedOptions[0]?.dataset.tipo;
    const planesFiltrados = (planes||[]).filter(p => p.equipo_tipo.toLowerCase() === (tipoSeleccionado||"").toLowerCase());
    selectPlan.innerHTML = planesFiltrados.length
      ? planesFiltrados.map(p => `<option value="${p.id}" data-frec-horometro="${p.frecuencia_horometro||""}" data-frec-dias="${p.frecuencia_dias||""}">${escapeHtml(p.nombre_tarea)}</option>`).join("")
      : `<option value="">-- No hay planes para este tipo de equipo --</option>`;
  });

  document.getElementById("btn-save-programado").addEventListener("click", async ()=>{
    const equipoId = selectEquipo.value;
    const planId = selectPlan.value;
    const horometroObj = document.getElementById("f-horometro-obj").value;
    const fechaObj = document.getElementById("f-fecha-obj").value;

    if(!equipoId || !planId){
      showToast("Selecciona equipo y plan", "error");
      return;
    }
    if(!horometroObj && !fechaObj){
      showToast("Especifica horometro objetivo o fecha objetivo", "error");
      return;
    }

    const { error } = await sb.from("gdm_mantenimientos_programados").insert({
      equipo_id: equipoId,
      plan_id: planId,
      horometro_objetivo: horometroObj ? parseFloat(horometroObj) : null,
      fecha_objetivo: fechaObj || null,
    });

    if(error){
      showToast("Error: " + error.message, "error");
      return;
    }
    showToast("Mantenimiento programado", "success");
    closeModal();
    renderProgramados();
  });
}

function openCompletarMantenimientoModal(prog){
  openModal(`
    <div class="modal-header">
      <h3>Completar mantenimiento</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <p style="font-size:13.5px; margin-bottom:14px;">
        <strong>${escapeHtml(prog.gdm_equipos.codigo_interno)}</strong> - ${escapeHtml(prog.gdm_planes_mantenimiento.nombre_tarea)}
      </p>
      <div class="form-group">
        <label>Tipo de mantenimiento</label>
        <select id="f-tipo-mant">
          <option value="preventivo">Preventivo</option>
          <option value="correctivo">Correctivo</option>
        </select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Fecha real</label>
          <input type="date" id="f-fecha-real" value="${new Date().toISOString().slice(0,10)}">
        </div>
        ${esAdmin() ? `
        <div class="form-group">
          <label>Costo (USD)</label>
          <input type="number" id="f-costo" placeholder="0.00">
        </div>` : ""}
      </div>
      <div class="form-group">
        <label>Realizado por</label>
        <input type="text" id="f-realizado-por" placeholder="Nombre del tecnico">
      </div>
      <div class="form-group">
        <label>Repuestos usados</label>
        <input type="text" id="f-repuestos" placeholder="Filtros, aceite, etc.">
      </div>
      <div class="form-group">
        <label>Observaciones</label>
        <textarea id="f-observaciones" rows="2"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="btn-confirmar-completar">Confirmar y cerrar mantenimiento</button>
    </div>
  `);

  document.getElementById("btn-confirmar-completar").addEventListener("click", async ()=>{
    const costoInput = document.getElementById("f-costo");
    const payload = {
      equipo_id: prog.equipo_id,
      programado_id: prog.id,
      tipo_mantenimiento: document.getElementById("f-tipo-mant").value,
      fecha_real: document.getElementById("f-fecha-real").value,
      costo: costoInput && costoInput.value ? parseFloat(costoInput.value) : null,
      realizado_por: document.getElementById("f-realizado-por").value.trim() || null,
      repuestos_usados: document.getElementById("f-repuestos").value.trim() || null,
      observaciones: document.getElementById("f-observaciones").value.trim() || null,
    };

    const { error: errHist } = await sb.from("gdm_mantenimientos_historial").insert(payload);
    if(errHist){
      showToast("Error al registrar historial: " + errHist.message, "error");
      return;
    }

    const { error: errUpdate } = await sb
      .from("gdm_mantenimientos_programados")
      .update({ estado: "completado" })
      .eq("id", prog.id);

    if(errUpdate){
      showToast("Historial guardado, pero hubo un error al cerrar el programado: " + errUpdate.message, "error");
      closeModal();
      renderProgramados();
      return;
    }

    showToast("Mantenimiento completado y registrado en historial", "success");
    closeModal();
    renderProgramados();
  });
}

/* ============================================================
   HOROMETRO
   ============================================================ */
async function renderHorometro(){
  const view = document.getElementById("view-container");
  view.innerHTML = `<div class="page-header"><h2>Horometro</h2></div><div class="loading-state">Cargando equipos...</div>`;

  const { data: equipos, error } = await sb
    .from("gdm_equipos")
    .select("id, codigo_interno, nombre, frecuencia_tipo")
    .in("frecuencia_tipo", ["horometro", "ambos"])
    .order("codigo_interno");

  if(error){
    view.innerHTML = `<div class="page-header"><h2>Horometro</h2></div><div class="empty-state">Error: ${escapeHtml(error.message)}</div>`;
    return;
  }

  if(!equipos || !equipos.length){
    view.innerHTML = `<div class="page-header"><h2>Horometro</h2></div><div class="empty-state">No hay equipos configurados con control por horometro. Configura el "Tipo de frecuencia" al crear o editar un equipo.</div>`;
    return;
  }

  const lecturas = {};
  for(const eq of equipos){
    const { data } = await sb
      .from("gdm_lecturas_horometro")
      .select("horas_acumuladas, fecha")
      .eq("equipo_id", eq.id)
      .order("fecha", { ascending: false })
      .limit(1)
      .maybeSingle();
    lecturas[eq.id] = data;
  }

  view.innerHTML = `
    <div class="page-header"><h2>Horometro</h2></div>
    <div style="display:flex; flex-direction:column; gap:8px;">
      ${equipos.map(eq => {
        const ultima = lecturas[eq.id];
        return `
        <div class="card" style="display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap;">
          <div>
            <div style="font-weight:600; font-size:13.5px;">${escapeHtml(eq.codigo_interno)} - ${escapeHtml(eq.nombre)}</div>
            <div style="font-size:12px; color:var(--texto-sec); margin-top:2px;">
              ${ultima ? `Ultima lectura: ${ultima.horas_acumuladas} hrs (${ultima.fecha})` : "Sin lecturas registradas"}
            </div>
          </div>
          <div style="display:flex; gap:6px;">
            ${esAdmin() ? `<button class="btn btn-sm" data-ver-historial-horometro="${eq.id}">Ver historial</button>` : ""}
            <button class="btn btn-primary btn-sm" data-registrar-lectura="${eq.id}">Registrar lectura</button>
          </div>
        </div>
      `}).join("")}
    </div>
  `;

  document.querySelectorAll("[data-registrar-lectura]").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const eq = equipos.find(e => e.id === btn.dataset.registrarLectura);
      openRegistrarLecturaModal(eq, lecturas[eq.id]);
    });
  });
  if(esAdmin()){
    document.querySelectorAll("[data-ver-historial-horometro]").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        const eq = equipos.find(e => e.id === btn.dataset.verHistorialHorometro);
        openHistorialHorometroModal(eq);
      });
    });
  }
}

async function openHistorialHorometroModal(equipo){
  openModal(`
    <div class="modal-header">
      <h3>Lecturas - ${escapeHtml(equipo.codigo_interno)}</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="historial-horometro-body">
      <div class="loading-state">Cargando lecturas...</div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cerrar</button>
    </div>
  `);

  const { data: lecturas, error } = await sb
    .from("gdm_lecturas_horometro")
    .select("*")
    .eq("equipo_id", equipo.id)
    .order("fecha", { ascending: false })
    .limit(20);

  const body = document.getElementById("historial-horometro-body");
  if(error){
    body.innerHTML = `<div class="empty-state">Error: ${escapeHtml(error.message)}</div>`;
    return;
  }
  if(!lecturas || !lecturas.length){
    body.innerHTML = `<div class="empty-state">Sin lecturas registradas.</div>`;
    return;
  }

  body.innerHTML = lecturas.map(l => `
    <div style="display:flex; justify-content:space-between; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--border);" data-lectura-row="${l.id}">
      <div style="font-size:13px;">
        <strong>${l.horas_acumuladas} hrs</strong> &middot; ${l.fecha}
        ${l.registrado_por ? ` &middot; ${escapeHtml(l.registrado_por)}` : ""}
      </div>
      <div style="display:flex; gap:6px; flex-shrink:0;">
        <button class="btn btn-sm" data-editar-lectura="${l.id}">Editar</button>
        <button class="btn btn-sm btn-danger" data-eliminar-lectura="${l.id}">Eliminar</button>
      </div>
    </div>
  `).join("");

  body.querySelectorAll("[data-editar-lectura]").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const lectura = lecturas.find(l => l.id === btn.dataset.editarLectura);
      openEditarLecturaModal(equipo, lectura);
    });
  });
  body.querySelectorAll("[data-eliminar-lectura]").forEach(btn=>{
    btn.addEventListener("click", async ()=>{
      if(!confirm("Eliminar esta lectura? Esto puede afectar el calculo del semaforo de mantenimiento para este equipo.")) return;
      const { error: errDel } = await sb.from("gdm_lecturas_horometro").delete().eq("id", btn.dataset.eliminarLectura);
      if(errDel){
        showToast("Error: " + errDel.message, "error");
        return;
      }
      showToast("Lectura eliminada", "success");
      closeModal();
      renderHorometro();
    });
  });
}

function openRegistrarLecturaModal(equipo, ultima){
  openModal(`
    <div class="modal-header">
      <h3>Registrar lectura - ${escapeHtml(equipo.codigo_interno)}</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      ${ultima ? `<p style="font-size:12.5px; color:var(--texto-sec); margin-bottom:12px;">Ultima lectura registrada: ${ultima.horas_acumuladas} hrs el ${ultima.fecha}</p>` : ""}
      <div class="form-group">
        <label>Horas acumuladas actuales *</label>
        <input type="number" id="f-horas" step="0.1" placeholder="Ej: 1340.5" autofocus>
      </div>
      <div class="form-group">
        <label>Fecha</label>
        <input type="date" id="f-fecha-lectura" value="${new Date().toISOString().slice(0,10)}">
      </div>
      <div class="form-group">
        <label>Registrado por</label>
        <input type="text" id="f-registrado-por" placeholder="Tu nombre">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="btn-save-lectura">Guardar lectura</button>
    </div>
  `);

  document.getElementById("btn-save-lectura").addEventListener("click", async ()=>{
    const horas = document.getElementById("f-horas").value;
    if(!horas){
      showToast("Ingresa las horas acumuladas", "error");
      return;
    }
    if(ultima && parseFloat(horas) < parseFloat(ultima.horas_acumuladas)){
      if(!confirm("El valor ingresado es menor a la ultima lectura registrada (" + ultima.horas_acumuladas + " hrs). Confirmas que es correcto?")){
        return;
      }
    }

    const { error } = await sb.from("gdm_lecturas_horometro").insert({

      horas_acumuladas: parseFloat(horas),

    });

    if(error){
      showToast("Error: " + error.message, "error");
      return;
    }
    showToast("Lectura registrada", "success");
    closeModal();
    renderHorometro();
  });
}

async function renderHistorial(){
  const view = document.getElementById("view-container");
  view.innerHTML = `<div class="page-header"><h2>Historial de mantenimientos</h2></div><div class="loading-state">Cargando historial...</div>`;

  const { data: historial, error } = await sb
    .from("gdm_mantenimientos_historial")
    .select("*, gdm_equipos(codigo_interno, nombre)")
    .order("fecha_real", { ascending: false })
    .limit(100);

  if(error){
    view.innerHTML = `<div class="page-header"><h2>Historial de mantenimientos</h2></div><div class="empty-state">Error: ${escapeHtml(error.message)}</div>`;
    return;
  }

  const verCostos = esAdmin();

  view.innerHTML = `
    <div class="page-header">
      <h2>Historial de mantenimientos</h2>
      <div class="page-header-actions">
        <select id="f-filtro-tipo" style="padding:7px 10px; border:1px solid var(--border); border-radius:var(--radius-sm); font-size:13px;">
          <option value="">Todos los tipos</option>
          <option value="preventivo">Preventivo</option>
          <option value="correctivo">Correctivo</option>
        </select>
      </div>
    </div>
    <div id="historial-lista"></div>
  `;

  function pintarLista(filtroTipo){
    const lista = document.getElementById("historial-lista");
    const filtrado = filtroTipo ? historial.filter(h => h.tipo_mantenimiento === filtroTipo) : historial;

    if(!filtrado.length){
      lista.innerHTML = `<div class="empty-state">No hay registros de historial.</div>`;
      return;
    }

    lista.innerHTML = `<div style="display:flex; flex-direction:column; gap:8px;">` + filtrado.map(h => `
      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:10px; flex-wrap:wrap;">
          <div>
            <div style="font-weight:600; font-size:13.5px;">${escapeHtml(h.gdm_equipos.codigo_interno)} - ${escapeHtml(h.gdm_equipos.nombre)}</div>
            <div style="font-size:12px; color:var(--texto-sec); margin-top:2px;">${h.fecha_real} ${h.realizado_por ? "&middot; " + escapeHtml(h.realizado_por) : ""}</div>
          </div>
          <span class="badge ${h.tipo_mantenimiento === "preventivo" ? "badge-verde" : "badge-rojo"}">${h.tipo_mantenimiento === "preventivo" ? "Preventivo" : "Correctivo"}</span>
        </div>
        ${h.repuestos_usados ? `<div style="font-size:12.5px; margin-top:8px;"><strong>Repuestos:</strong> ${escapeHtml(h.repuestos_usados)}</div>` : ""}
        ${h.observaciones ? `<div style="font-size:12.5px; margin-top:4px;">${escapeHtml(h.observaciones)}</div>` : ""}
        ${verCostos && h.costo ? `<div style="font-size:12.5px; margin-top:6px; font-weight:600;">Costo: $${h.costo}</div>` : ""}
      </div>
    `).join("") + `</div>`;
  }

  pintarLista("");
  document.getElementById("f-filtro-tipo").addEventListener("change", (e)=> pintarLista(e.target.value));
}

async function renderUsuarios(){

  if(!esAdmin()){
    view.innerHTML = `<div class="page-header"><h2>Usuarios</h2></div><div class="empty-state">No tienes permiso para ver esta seccion.</div>`;
    return;
  }

  view.innerHTML = `<div class="page-header"><h2>Usuarios</h2></div><div class="loading-state">Cargando usuarios...</div>`;

  const { data: usuariosRaw, error } = await sb.rpc("gdm_listar_usuarios");
  const usuarios = usuariosRaw ? [...usuariosRaw].sort((a,b) => new Date(a.created_at) - new Date(b.created_at)) : [];

  if(error){
    view.innerHTML = `<div class="page-header"><h2>Usuarios</h2></div><div class="empty-state">Error: ${escapeHtml(error.message)}</div>`;
    return;
  }

  const rolLabel = { admin: "Administrador", supervisor: "Supervisor", tecnico: "Tecnico" };
  const rolBadge = { admin: "badge-rojo", supervisor: "badge-amarillo", tecnico: "badge-verde" };

  view.innerHTML = `
    <div class="page-header">
      <h2>Usuarios</h2>
      <div class="page-header-actions">
        <button class="btn btn-primary" id="btn-nuevo-usuario">+ Dar acceso a alguien</button>
      </div>
    </div>
    <div style="display:flex; flex-direction:column; gap:8px;">
      ${(usuarios && usuarios.length) ? usuarios.map(u => `
        <div class="card" style="display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; ${!u.activo ? "opacity:0.55;" : ""}">
          <div>
            <div style="font-weight:600; font-size:13.5px;">${escapeHtml(u.email)}</div>
            <div style="font-size:12px; color:var(--texto-sec); margin-top:2px;">
              Desde ${new Date(u.created_at).toLocaleDateString("es-EC")}
              ${!u.activo ? " &middot; Desactivado" : ""}
            </div>
          </div>
          <div style="display:flex; gap:8px; align-items:center;">
            <span class="badge ${rolBadge[u.rol] || "badge-gris"}">${rolLabel[u.rol] || u.rol}</span>
            <button class="btn btn-sm" data-editar-usuario="${u.id}">Editar</button>
          </div>
        </div>
      `).join("") : `<div class="empty-state">No hay usuarios con acceso a GdM todavia.</div>`}
    </div>
  `;

  document.getElementById("btn-nuevo-usuario").addEventListener("click", openNuevoUsuarioModal);
  document.querySelectorAll("[data-editar-usuario]").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const u = usuarios.find(x => x.id === btn.dataset.editarUsuario);
      openEditarUsuarioModal(u);
    });
  });
}

function openNuevoUsuarioModal(){
  openModal(`
    <div class="modal-header">
      <h3>Dar acceso a GdM</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Correo de la persona *</label>
        <input type="email" id="f-nuevo-email" placeholder="correo@hidivo.com">
        <p style="font-size:12px; color:var(--texto-sec); margin-top:5px;">La persona debe tener ya una cuenta en el sistema HIDIVO (Supabase). Esto no crea una cuenta nueva, solo le da acceso a GdM.</p>
      </div>
      <div class="form-group">
        <label>Rol *</label>
        <select id="f-nuevo-rol">
          <option value="tecnico">Tecnico</option>
          <option value="supervisor">Supervisor</option>
          <option value="admin">Administrador</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="btn-save-nuevo-usuario">Dar acceso</button>
    </div>
  `);

  document.getElementById("btn-save-nuevo-usuario").addEventListener("click", async ()=>{
    const email = document.getElementById("f-nuevo-email").value.trim();
    const rol = document.getElementById("f-nuevo-rol").value;

    if(!email){
      showToast("Ingresa un correo", "error");
      return;
    }

    const { data: userId, error: errBuscar } = await sb.rpc("gdm_buscar_user_id_por_email", { p_email: email });

    if(errBuscar){
      showToast("Error al buscar el usuario: " + errBuscar.message, "error");
      return;
    }
    if(!userId){
      showToast("No existe ninguna cuenta con ese correo en el sistema HIDIVO", "error");
      return;
    }

    const { error: errInsert } = await sb.from("gdm_usuarios_roles").insert({
      user_id: userId,
      rol: rol,
      activo: true,
    });

    if(errInsert){
      if(errInsert.message.includes("duplicate") || errInsert.code === "23505"){
        showToast("Esta persona ya tiene acceso a GdM. Edita su rol desde la lista.", "error");
      } else {
        showToast("Error: " + errInsert.message, "error");
      }
      return;
    }

    showToast("Acceso otorgado correctamente", "success");
    closeModal();
    renderUsuarios();
  });
}

function openEditarUsuarioModal(usuario){
  const esUnoMismo = usuario.user_id === currentUser.id;
  openModal(`
    <div class="modal-header">
      <h3>${escapeHtml(usuario.email)}</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Rol</label>
        <select id="f-edit-rol" ${esUnoMismo ? "disabled" : ""}>
          <option value="tecnico" ${usuario.rol === "tecnico" ? "selected" : ""}>Tecnico</option>
          <option value="supervisor" ${usuario.rol === "supervisor" ? "selected" : ""}>Supervisor</option>
          <option value="admin" ${usuario.rol === "admin" ? "selected" : ""}>Administrador</option>
        </select>
      </div>
      <div class="form-group">
        <label><input type="checkbox" id="f-edit-activo" ${usuario.activo ? "checked" : ""} ${esUnoMismo ? "disabled" : ""} style="width:auto; margin-right:6px;">Acceso activo</label>
      </div>
      ${esUnoMismo ? `<p style="font-size:12px; color:var(--texto-sec);">No puedes cambiar tu propio rol ni desactivarte a ti mismo.</p>` : ""}
    </div>
    <div class="modal-footer">
      ${!esUnoMismo ? `<button class="btn btn-danger" id="btn-quitar-acceso">Quitar acceso</button>` : ""}
      <button class="btn" onclick="closeModal()">Cancelar</button>
      ${!esUnoMismo ? `<button class="btn btn-primary" id="btn-save-edit-usuario">Guardar</button>` : ""}
    </div>
  `);

  if(esUnoMismo) return;

  document.getElementById("btn-save-edit-usuario").addEventListener("click", async ()=>{
    const { error } = await sb.from("gdm_usuarios_roles").update({
      rol: document.getElementById("f-edit-rol").value,
      activo: document.getElementById("f-edit-activo").checked,
    }).eq("id", usuario.id);

    if(error){
      showToast("Error: " + error.message, "error");
      return;
    }
    showToast("Usuario actualizado", "success");
    closeModal();
    renderUsuarios();
  });

  document.getElementById("btn-quitar-acceso").addEventListener("click", async ()=>{
    if(!confirm(`Quitar el acceso de ${usuario.email} a GdM?`)) return;
    const { error } = await sb.from("gdm_usuarios_roles").delete().eq("id", usuario.id);
    if(error){
      showToast("Error: " + error.message, "error");
      return;
    }
    showToast("Acceso eliminado", "success");
    closeModal();
    renderUsuarios();
  });
}
</script>
